<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-toggle" onclick="toggleSidebar()">☰</div>
    <div class="nav-header">לוח בקרה</div>
    <button id="nav-games" class="nav-btn active">רשימת משחקים</button>
    <button id="nav-players" class="nav-btn">ממוצעי שחקנים</button>
    <button id="nav-teams" class="nav-btn">השוואת קבוצות</button>
    <button id="nav-player-profile" class="nav-btn">שחקן אישי</button>
</nav>

<main>
    <section id="sec-games">
        <div class="season-filters-container"></div>
        <h2 style="margin-bottom:20px;">רשימת משחקים</h2>
        <div id="games-container"></div>
    </section>

    <section id="sec-players" style="display:none;">
        <div class="season-filters-container"></div>
        <h2>ממוצעי שחקנים</h2>
        <div id="players-container"></div>
    </section>

    <section id="sec-teams" style="display:none;">
        <div class="season-filters-container"></div>
        <div id="teams-container"></div>
    </section>

    <section id="sec-player-profile" style="display:none;">
        <div class="filters-container">
            <div class="filter-label">בחר שחקן לצפייה בקריירה:</div>
            <select id="player-select" class="player-dropdown" onchange="renderPlayerProfile()">
                <option value="">טוען שחקנים...</option>
            </select>
        </div>
        <div id="profile-content"></div>
    </section>

</main>

<script src="dashboard.js"></script>
</body>
</html>

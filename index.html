<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav id="sidebar">
        <div class="sidebar-toggle" onclick="toggleSidebar()">☰</div>
        <div class="nav-header">Stats Dashboard</div>
        <button type="button" id="nav-games" class="nav-btn active">משחקים</button>
        <button type="button" id="nav-players" class="nav-btn">שחקנים</button>
        <button type="button" id="nav-teams" class="nav-btn">קבוצות</button>
    </nav>

    <main id="main-content">
        <section id="sec-games">
            <div class="filters-container">
                <div class="filter-group">
                    <div class="filter-label">בחירת עונה:</div>
                    <div id="season-checkboxes" class="checkbox-list"></div>
                </div>
            </div>
            <div class="table-header-row">
                <h2>רשימת משחקים</h2>
                <button class="adv-toggle-btn" onclick="toggleAdvancedMode()">
                    <span class="dot"></span> ADV Mode
                </button>
            </div>
            <div id="games-container"></div>
        </section>

        <section id="sec-players" style="display:none;">
            <div class="table-header-row">
                <h2>ממוצעי שחקנים</h2>
                <button class="adv-toggle-btn" onclick="toggleAdvancedMode()">
                    <span class="dot"></span> ADV Mode
                </button>
            </div>
            <div class="table-wrapper">
                <div id="players-container"></div>
            </div>
        </section>

        <section id="sec-teams" style="display:none;">
            <div class="table-header-row">
                <h2>סטטיסטיקה קבוצתית</h2>
            </div>
            <div class="table-wrapper">
                <div id="teams-container"></div>
            </div>
        </section>
    </main>
    <script src="dashboard.js"></script>
</body>
</html>
